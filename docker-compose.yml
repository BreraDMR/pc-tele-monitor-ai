version: '3.8'

services:
  monitor_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: system_monitor_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount the WSL2 kernel proc/sys interfaces to let psutil view host-level CPU and memory metrics
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # Mount the Windows C:\ host drive as read-only to monitor disk space utilization
      - C:/:/host_c:ro
